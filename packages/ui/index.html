      <h1>Deadem Explorer — Deadlock, Dota 2 and Counter-Strike 2 (CS2) Demo Parser Libraries</h1>
      <p>Deadem is a set of open-source JavaScript libraries for parsing Source 2 .dem replay files from Deadlock, Dota 2 and Counter-Strike 2 (CS2). Deadem Explorer is a live in-browser demo of those libraries — try them out without installing anything or uploading replays to a server.</p>
      <p>Upload a .dem file or choose one from the library to see the parser in action: inspect packets, browse game entities, and view server info, tick rate, and string tables.</p>
      <h2>Features</h2>
      <ul>
        <li>Parse Deadlock, Dota 2 and Counter-Strike 2 (CS2) replay files (.dem) in the browser</li>
        <li>Inspect demo packets and message packets in JSON form</li>
        <li>Browse live game entities and classes as the replay updates</li>
        <li>View server info, tick rate, entity counts, and string tables</li>
        <li>Use the same parser libraries in Node.js and modern browsers</li>
      </ul>
      <p>Built with the <a href="https://www.npmjs.com/package/@deademx/engine">@deademx/engine</a>, <a href="https://www.npmjs.com/package/deadem">deadem</a> (Deadlock), <a href="https://www.npmjs.com/package/@deademx/dota2">@deademx/dota2</a>, and <a href="https://www.npmjs.com/package/@deademx/cs2">@deademx/cs2</a> JavaScript libraries. The app runs locally in the browser for private replay inspection.</p>
      <p><a href="https://github.com/Igor-Losev/deadem">View on GitHub</a></p>
