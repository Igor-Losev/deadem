      <h1>Deadem Explorer — Deadlock and Dota 2 Demo Parser</h1>
      <p>Deadem Explorer is a free online tool and open-source JavaScript demo parser for analyzing Deadlock and Dota 2 replay files (.dem) directly in your browser.</p>
      <p>Upload a .dem file or choose one from the library to inspect packets, browse game entities, and view server info, tick rate, and string tables without uploading your replay to a server.</p>
      <h2>Features</h2>
      <ul>
        <li>Parse Deadlock and Dota 2 replay files (.dem) in the browser</li>
        <li>Inspect demo packets and message packets in JSON form</li>
        <li>Browse live game entities and classes as the replay updates</li>
        <li>View server info, tick rate, entity counts, and string tables</li>
        <li>Use the same parser libraries in Node.js and modern browsers</li>
      </ul>
      <p>Built with the <a href="https://www.npmjs.com/package/@deademx/engine">@deademx/engine</a>, <a href="https://www.npmjs.com/package/deadem">deadem</a>, and <a href="https://www.npmjs.com/package/@deademx/dota2">@deademx/dota2</a> JavaScript libraries. The app runs locally in the browser for private replay inspection.</p>
