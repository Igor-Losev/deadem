name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: List versions
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  replay-regression:
    name: Replay Regression (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: deadlock
            demo_dir: demos/deadlock
            demo_files: |
              36126255-5637
              51543455-6140
              75438101-6448
              75439032-6448
            demo_cdn_prefix: https://deadem.com/demos/deadlock
            parser_script: ./packages/examples-node-deadem/scripts/101_parse_multiple.js
          - name: cs2
            demo_dir: demos/cs2
            demo_files: |
              2026-05-11-furia-vs-spirit-m1-dust2
              2026-05-15-natus-vincere-vs-vitality-m3-inferno
            demo_cdn_prefix: https://deadem.com/demos/cs2
            parser_script: ./packages/examples-node-cs2/scripts/101_parse_multiple.js
          - name: dota2
            demo_dir: demos/dota2
            demo_files: |
              8773493455
              8777738576
              8783006717
              8783086929
            demo_cdn_prefix: https://deadem.com/demos/dota2
            parser_script: ./packages/examples-node-dota2/scripts/101_parse_multiple.js

    env:
      DEMO_DIR: ${{ matrix.demo_dir }}
      DEMO_FILES: ${{ matrix.demo_files }}
      DEMO_CDN_PREFIX: ${{ matrix.demo_cdn_prefix }}
      PARSER_SCRIPT: ${{ matrix.parser_script }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Demo Cache Key
        id: demo-cache-key
        run: echo "key=$(bash ./.github/scripts/demo-fixtures.sh cache-key)" >> "$GITHUB_OUTPUT"

      - name: Restore Demo Cache
        uses: actions/cache@v5
        with:
          path: ${{ env.DEMO_DIR }}
          key: replay-demos-v1-${{ matrix.name }}-${{ steps.demo-cache-key.outputs.key }}
          restore-keys: |
            replay-demos-v1-${{ matrix.name }}-

      - name: Ensure Demo Fixtures
        run: bash ./.github/scripts/demo-fixtures.sh ensure

      - name: List demo files
        run: ls -lh "$DEMO_DIR"

      - name: Run Replay Regression
        run: node "$PARSER_SCRIPT" --matches="$(bash ./.github/scripts/demo-fixtures.sh matches)"
