name: Proto Synchronization

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.repository == 'Igor-Losev/deadem'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: deadem
            workspace: deadem
            repo: GameTracking-Deadlock
          - target: dota2
            workspace: '@deademx/dota2'
            repo: GameTracking-Dota2
          - target: cs2
            workspace: '@deademx/cs2'
            repo: GameTracking-CS2

    concurrency:
      group: proto-sync-${{ matrix.target }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Sync proto sources
        run: node .github/scripts/proto-sync.mjs ${{ matrix.target }}

      - name: Compile proto JSON
        run: npm run proto:json -w ${{ matrix.workspace }}

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: auto/proto-sync-${{ matrix.target }}
          title: 'Proto Synchronization — ${{ matrix.target }} (Auto)'
          commit-message: 'Proto Synchronization — ${{ matrix.target }} (Auto)'
          body: |
            Automated sync of `.proto` files from `SteamTracking/${{ matrix.repo }}`:
            - `packages/${{ matrix.target }}/proto/source/`

            Includes regenerated `proto/compiled/proto.json`.
          labels: proto-sync
